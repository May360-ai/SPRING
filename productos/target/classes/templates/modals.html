<div th:fragment="categoryModal">
    <div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalLabel">Nueva Categoría</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="categoryForm">
                        <input type="hidden" id="categoryEditMode" value="false">
                        <input type="hidden" id="categoryId">
                        <div class="mb-3">
                            <label for="categoryNombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="categoryNombre" required>
                            <div id="nombreError" class="text-danger validation-error"></div>
                        </div>
                        <div class="mb-3">
                            <label for="categoryDescripcion" class="form-label">Descripción</label>
                            <textarea class="form-control" id="categoryDescripcion" rows="3"></textarea>
                            <div id="descripcionError" class="text-danger validation-error"></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" id="btnSaveCategory" class="btn btn-primary">Guardar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="productModal">
    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalLabel">Nuevo Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="productEditMode" value="false">
                        <input type="hidden" id="productId">
                        <div class="mb-3">
                            <label for="productNombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="productNombre" required>
                            <div id="productNombreError" class="text-danger validation-error"></div>
                        </div>
                        <div class="mb-3">
                            <label for="productPrecio" class="form-label">Precio</label>
                            <input type="number" step="0.01" class="form-control" id="productPrecio" required>
                            <div id="precioError" class="text-danger validation-error"></div>
                        </div>
                        <div class="mb-3">
                            <label for="productStock" class="form-label">Stock</label>
                            <input type="number" class="form-control" id="productStock" required>
                            <div id="stockError" class="text-danger validation-error"></div>
                        </div>
                        <div class="mb-3">
                            <label for="productCategory" class="form-label">Categoría</label>
                            <select class="form-select" id="productCategory" required>
                                <option value="">Seleccione una categoría</option>
                            </select>
                            <div id="categoryIdError" class="text-danger validation-error"></div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" id="btnSaveProduct" class="btn btn-primary">Guardar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="deleteModal">
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar Eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    ¿Está seguro de que desea eliminar este elemento?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btnConfirmDelete" class="btn btn-danger">Eliminar</button>
                </div>
            </div>
        </div>
    </div>
</div>
