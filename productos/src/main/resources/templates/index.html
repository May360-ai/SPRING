<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos y Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="container mt-5">

    <h1 class="mb-4 text-center">Gestión de Inventario</h1>

    <!-- Pestañas -->
    <ul class="nav nav-tabs mb-4" id="inventoryTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="categories-tab" data-bs-toggle="tab" data-bs-target="#categories-content" type="button" role="tab">Categorías</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="products-tab" data-bs-toggle="tab" data-bs-target="#products-content" type="button" role="tab">Productos</button>
        </li>
    </ul>

    <div class="tab-content" id="inventoryTabsContent">
        <!-- Contenido Categorías -->
        <div class="tab-pane fade show active" id="categories-content" role="tabpanel">
            <div class="d-flex mb-3 align-items-center">
                <button id="btnNewCategory" class="btn btn-primary me-2">Nueva Categoría</button>
                <div class="flex-grow-1 mx-3">
                    <input type="text" id="searchCategoryInput" class="form-control" placeholder="Buscar por nombre...">
                </div>
                <div class="ms-auto">
                    <button id="btnEditCategory" class="btn btn-secondary me-2" disabled>Editar</button>
                    <button id="btnDeleteCategory" class="btn btn-danger" disabled>Eliminar</button>
                </div>
            </div>

            <table class="table table-bordered table-hover" id="categoriesTable">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                    </tr>
                </thead>
                <tbody id="categoriesBody"></tbody>
            </table>
        </div>

        <!-- Contenido Productos -->
        <div class="tab-pane fade" id="products-content" role="tabpanel">
            <div class="d-flex mb-3 align-items-center">
                <button id="btnNewProduct" class="btn btn-primary me-2">Nuevo Producto</button>
                <div class="flex-grow-1 mx-3">
                    <input type="text" id="searchProductInput" class="form-control" placeholder="Buscar por nombre...">
                </div>
                <div class="ms-auto">
                    <button id="btnEditProduct" class="btn btn-secondary me-2" disabled>Editar</button>
                    <button id="btnDeleteProduct" class="btn btn-danger" disabled>Eliminar</button>
                </div>
            </div>

            <table class="table table-bordered table-hover" id="productsTable">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Categoría</th>
                    </tr>
                </thead>
                <tbody id="productsBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Modales -->
    <div th:replace="~{modals :: categoryModal}"></div>
    <div th:replace="~{modals :: productModal}"></div>
    <div th:replace="~{modals :: deleteModal}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
