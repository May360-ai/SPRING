<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Libros y Autores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="container mt-5">

    <h1 class="mb-4 text-center">Gestión de Librería</h1>

    <!-- Pestañas -->
    <ul class="nav nav-tabs mb-4" id="libraryTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="authors-tab" data-bs-toggle="tab" data-bs-target="#authors-content" type="button" role="tab">Autores</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="books-tab" data-bs-toggle="tab" data-bs-target="#books-content" type="button" role="tab">Libros</button>
        </li>
    </ul>

    <div class="tab-content" id="libraryTabsContent">
        <!-- Contenido Autores -->
        <div class="tab-pane fade show active" id="authors-content" role="tabpanel">
            <div class="d-flex mb-3 align-items-center">
                <button id="btnNewAuthor" class="btn btn-primary me-2">Nuevo Autor</button>
                <div class="flex-grow-1 mx-3">
                    <input type="text" id="searchAuthorInput" class="form-control" placeholder="Buscar por nombre...">
                </div>
                <div class="ms-auto">
                    <button id="btnEditAuthor" class="btn btn-secondary me-2" disabled>Editar</button>
                    <button id="btnDeleteAuthor" class="btn btn-danger" disabled>Eliminar</button>
                </div>
            </div>

            <table class="table table-bordered table-hover" id="authorsTable">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Teléfono</th>
                    </tr>
                </thead>
                <tbody id="authorsBody"></tbody>
            </table>
        </div>

        <!-- Contenido Libros -->
        <div class="tab-pane fade" id="books-content" role="tabpanel">
            <div class="d-flex mb-3 align-items-center">
                <button id="btnNewBook" class="btn btn-primary me-2">Nuevo Libro</button>
                <div class="flex-grow-1 mx-3">
                    <input type="text" id="searchBookInput" class="form-control" placeholder="Buscar por título...">
                </div>
                <div class="ms-auto">
                    <button id="btnEditBook" class="btn btn-secondary me-2" disabled>Editar</button>
                    <button id="btnDeleteBook" class="btn btn-danger" disabled>Eliminar</button>
                </div>
            </div>

            <table class="table table-bordered table-hover" id="booksTable">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Páginas</th>
                        <th>Autor</th>
                    </tr>
                </thead>
                <tbody id="booksBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Modales -->
    <div th:replace="~{modals :: authorModal}"></div>
    <div th:replace="~{modals :: bookModal}"></div>
    <div th:replace="~{modals :: deleteModal}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
